<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            background-color: #0a0f2c;
            font-family: 'Satoshi', sans-serif;
            position: relative;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: #00f5c3;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 500px;
            background: radial-gradient(ellipse at center, rgba(0, 245, 195, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .ghost-text {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 180px;
            font-weight: 700;
            color: #00f5c3;
            opacity: 0.03;
            user-select: none;
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 80px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
        }

        .label {
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            color: #00f5c3;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 400;
        }

        .name {
            font-family: 'Satoshi', sans-serif;
            font-size: 72px;
            font-weight: 700;
            color: #e6f1ff;
            margin-top: 16px;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .role {
            font-family: 'Satoshi', sans-serif;
            font-size: 28px;
            font-weight: 500;
            color: #a8b2d1;
            margin-top: 8px;
            line-height: 1.3;
        }

        .divider {
            width: 480px;
            height: 1px;
            background-color: #232a55;
            margin-top: 32px;
        }

        .url {
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            color: #00f5c3;
            margin-top: 24px;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    <div class="glow"></div>
    <div class="ghost-text">YG</div>
    <div class="content">
        <span class="label">Portfolio</span>
        <h1 class="name">Yuvraj Gupta</h1>
        <p class="role">AI Strategist and Enterprise Transformation</p>
        <div class="divider"></div>
        <span class="url">theyuvrajgupta.github.io</span>
    </div>
</body>
</html>
